name: Paper Release

on:
  push:
    branches:
      - "alpha/v*/v*.*"
      - "release/v*/v*.*"
  workflow_dispatch:
    inputs:
      buildchain-ref:
        description: "Temporary Buildchain runtime ref for trusted manual validation"
        required: false
        default: ""

jobs:
  paper-release:
    uses: kungfu-systems/buildchain/.github/workflows/paper-release.yml@v2-alpha
    permissions:
      checks: write
      contents: write
      id-token: write
      issues: write
    with:
      buildchain-ref: ${{ inputs.buildchain-ref || '' }}
      buildchain-contract-lock-path: .buildchain/contract-lock.json
      toolchain-type: config
      verify-command: npm run check
      artifact-name: paper-kungfu-product-white-paper
      release-passport-product-name: Kungfu Product White Paper
      release-passport-impact-json: release-impact.json
